version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/tools/loop-audit"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(audit)"
  - package-ecosystem: "npm"
    directory: "/tools/loop-init"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(loop-init)"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"